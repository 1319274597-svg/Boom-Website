<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOM MEDIA ASIA – Make China Brands Global</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="header">
  <div class="header-inner">
    <a href="#home" class="header-logo">
      <img src="../images/logo_boom_media_asia.png" alt="BOOM MEDIA ASIA" class="header-logo-img" onerror="this.style.display='none'">
    </a>
    <nav class="nav" id="main-nav"></nav>
    <div class="lang-switch">
      <button data-lang="zh" class="active">中</button>
      <button data-lang="en">EN</button>
      <button data-lang="th">ไทย</button>
    </div>
    <button class="mobile-menu-btn" aria-label="Menu">☰</button>
  </div>
</header>

<!-- ========== HERO ========== -->
<section class="hero" id="home">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div class="hero-badge"></div>
    <h1 class="hero-title"></h1>
    <p class="hero-subtitle"></p>
    <div class="hero-cta">
      <a href="#capability" class="btn btn-primary"></a>
      <a href="#contact" class="btn btn-outline"></a>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</section>

<!-- ========== ABOUT ========== -->
<section class="section" id="about">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <div class="about-grid">
      <div class="about-text">
        <p></p>
        <p></p>
        <p></p>
        <div class="about-highlights">
          <div class="highlight-card"><div class="hl-icon">🏆</div><div class="hl-title"></div><div class="hl-desc"></div></div>
          <div class="highlight-card"><div class="hl-icon">🦄</div><div class="hl-title"></div><div class="hl-desc"></div></div>
          <div class="highlight-card"><div class="hl-icon">⭐</div><div class="hl-title"></div><div class="hl-desc"></div></div>
          <div class="highlight-card"><div class="hl-icon">📋</div><div class="hl-title"></div><div class="hl-desc"></div></div>
        </div>
        <div class="about-group-logo">
          <img src="../images/group-logo-black.png" alt="BOOM TECHNOLOGY GROUP" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
          <p></p>
        </div>
      </div>
      <div>
        <h3 class="about-timeline-title section-subtitle" style="text-align:left;margin-top:0;"></h3>
        <div class="timeline"></div>
      </div>
    </div>
  </div>
</section>

<!-- ========== CAPABILITY ========== -->
<section class="section" id="capability">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <p class="section-desc"></p>
    <div class="cap-grid">
      <div class="cap-card fade-in"><div class="cap-icon"></div><div class="cap-title"></div><div class="cap-desc"></div></div>
      <div class="cap-card fade-in"><div class="cap-icon"></div><div class="cap-title"></div><div class="cap-desc"></div></div>
      <div class="cap-card fade-in"><div class="cap-icon"></div><div class="cap-title"></div><div class="cap-desc"></div></div>
    </div>
    <h3 class="process-label section-subtitle"></h3>
    <div class="process-flow">
      <div class="process-step fade-in"><div class="step-num">1</div><div class="step-title"></div><div class="step-desc"></div><div class="step-arrow">→</div></div>
      <div class="process-step fade-in"><div class="step-num">2</div><div class="step-title"></div><div class="step-desc"></div><div class="step-arrow">→</div></div>
      <div class="process-step fade-in"><div class="step-num">3</div><div class="step-title"></div><div class="step-desc"></div><div class="step-arrow">→</div></div>
      <div class="process-step fade-in"><div class="step-num">4</div><div class="step-title"></div><div class="step-desc"></div><div class="step-arrow">→</div></div>
      <div class="process-step fade-in"><div class="step-num">5</div><div class="step-title"></div><div class="step-desc"></div><div class="step-arrow">→</div></div>
      <div class="process-step fade-in"><div class="step-num">6</div><div class="step-title"></div><div class="step-desc"></div></div>
    </div>
    <h3 class="adv-label section-subtitle"></h3>
    <div class="adv-grid">
      <div class="adv-card fade-in"><div class="adv-num"></div><div class="adv-body"><h4></h4><p></p></div></div>
      <div class="adv-card fade-in"><div class="adv-num"></div><div class="adv-body"><h4></h4><p></p></div></div>
      <div class="adv-card fade-in"><div class="adv-num"></div><div class="adv-body"><h4></h4><p></p></div></div>
      <div class="adv-card fade-in"><div class="adv-num"></div><div class="adv-body"><h4></h4><p></p></div></div>
    </div>
  </div>
</section>

<!-- ========== STRENGTH ========== -->
<section class="section" id="strength">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <div class="strength-grid">
      <div class="strength-card fade-in">
        <img src="../images/slide_10_img3.png" alt="" class="strength-img" onerror="this.style.display='none'">
        <div class="strength-body"><h4></h4><p></p></div>
      </div>
      <div class="strength-card fade-in">
        <img src="../images/slide_11_img3.png" alt="" class="strength-img" onerror="this.style.display='none'">
        <div class="strength-body"><h4></h4><p></p></div>
      </div>
      <div class="strength-card fade-in">
        <img src="../images/slide_08_img4.png" alt="" class="strength-img" onerror="this.style.display='none'">
        <div class="strength-body"><h4></h4><p></p></div>
      </div>
    </div>
  </div>
</section>

<!-- ========== TALENT ========== -->
<section class="section" id="talent">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <p class="section-desc"></p>
    <div class="talent-layout">
      <div class="talent-featured"></div>
      <div class="talent-grid"></div>
    </div>
  </div>
</section>

<!-- ========== CLIENTS (Slide 13) ========== -->
<section class="section" id="clients">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <div class="clients-stats-banner">
      <h3></h3>
      <p></p>
    </div>
    <div class="clients-grid" id="clients-grid">
      <!-- Populated by JS -->
    </div>
  </div>
</section>

<!-- ========== CASES ========== -->
<section class="section" id="cases">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <p class="section-desc"></p>
    <div class="case-filters">
      <button class="case-filter active" data-filter="all"></button>
      <button class="case-filter" data-filter="tourism"></button>
      <button class="case-filter" data-filter="brand"></button>
    </div>
    <div class="case-grid" id="case-grid"></div>
  </div>
</section>

<!-- ========== CASE MODAL ========== -->
<div class="modal-overlay" id="case-modal-overlay">
  <div class="modal" id="case-modal"></div>
</div>

<!-- ========== CONTACT ========== -->
<section class="section contact" id="contact">
  <div class="section-inner">
    <span class="section-label"></span>
    <h2 class="section-title"></h2>
    <p class="section-desc"></p>
    <div class="contact-grid">
      <div class="contact-card fade-in"><div class="contact-icon"></div><h4></h4><p></p></div>
      <div class="contact-card fade-in"><div class="contact-icon"></div><h4></h4><p></p></div>
      <div class="contact-card fade-in"><div class="contact-icon"></div><h4></h4><p></p></div>
    </div>
    <div class="contact-emails" id="contact-emails"></div>
    <div style="margin-top:40px;">
      <a href="#home" class="btn btn-primary"></a>
    </div>
  </div>
</section>

<!-- ========== FOOTER ========== -->
<footer class="footer" id="footer">
  <div class="footer-logo"></div>
  <div class="footer-emails" id="footer-emails"></div>
  <div class="footer-links">
    <a href="#about"></a>
    <a href="#capability"></a>
    <a href="#talent"></a>
    <a href="#clients"></a>
    <a href="#cases"></a>
    <a href="#contact"></a>
  </div>
  <div class="footer-copy"></div>
  <img src="../images/group-logo.png" alt="" class="footer-group-logo" onerror="this.style.display='none'">
</footer>

<script src="js/main.js"></script>
</body>
</html>
